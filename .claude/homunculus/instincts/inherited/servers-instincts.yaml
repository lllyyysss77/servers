# Servers Workflow Upgrade Dependencies Across Packages

## Action

Follow the upgrade-dependencies-across-packages workflow:
1. Update dependency version in each affected package.json (e.g., src/everything/package.json, src/filesystem/package.json, etc.)
2. Update package-lock.json to reflect new dependency versions
3. Update code files if necessary to accommodate breaking changes or new APIs from the upgraded dependency

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: package-lock.json, src/*/package.json, src/everything/tools/*.ts

